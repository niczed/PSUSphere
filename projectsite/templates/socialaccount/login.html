{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirm Google Login</title>

    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.2/mdb.min.css" />

    <style>
        body {
            background-color: #f8f9fc;
        }

        .center-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 2.5rem;
            text-align: center;
        }

        .auth-card h3 {
            font-weight: 600;
        }

        .btn-block {
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="center-wrapper">
        <div class="auth-card">
            <h3 class="mb-4">Confirm Sign In</h3>

            <p class="mb-4">
                You are about to sign in using your
                <strong>{{ provider.name }}</strong> account.
            </p>

            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-primary btn-block mb-3">
                    Continue with {{ provider.name }}
                </button>
            </form>

            <a href="{% url 'account_login' %}" class="btn btn-outline-secondary btn-block">
                Cancel
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.2/mdb.min.js"></script>
</body>
</html>
